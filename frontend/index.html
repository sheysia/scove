<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SCove">
<meta name="theme-color" content="#0D0A14">
<link rel="manifest" href="/static/manifest.json">
<link rel="apple-touch-icon" href="/static/icon-192.png">
<title>SCove</title>
<style>
:root {
  --bg:         #0D0A14;
  --surface:    #151219;
  --surface-t:  rgba(21, 18, 25, 0.88);
  --border:     #2a2433;
  --text:       #e8e4ef;
  --text-dim:   #7a7285;
  --text-faint: rgba(255,255,255,0.12);
  --accent:     #8b7cb8;
  --accent-g:   #5b4f8a;
  --gold:       #c9a85c;
  --gold-dim:   rgba(201,168,92,0.5);
  --v-bubble:   rgba(35, 28, 48, 0.85);
  --u-bubble:   rgba(255, 255, 255, 0.08);
  --u-border:   rgba(255, 255, 255, 0.15);
  --glass:      rgba(13, 10, 20, 0.75);
  --safe-b:     env(safe-area-inset-bottom, 0px);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: -apple-system, "PingFang SC", "Noto Sans SC", "SF Pro Text", sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  position: relative;
}
/* Eden bg — portrait image (852×1846), adapt to screen shape */
body::before {
  content: '';
  position: fixed; inset: 0;
  background: url('/static/bg-eden.png') center bottom / contain no-repeat;
  opacity: 0.22;
  pointer-events: none;
  z-index: 0;
}
/* On wide screens, switch to cover so the bg fills without pillarboxing */
@media (min-aspect-ratio: 1/1) {
  body::before {
    background-size: cover;
    background-position: center center;
  }
}
body > * { position: relative; z-index: 1; }

/* ── PIN overlay ── */
#pin-overlay {
  position: fixed; inset: 0; z-index: 100;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 16px;
}
#pin-overlay.hidden { display: none; }
#pin-overlay h2 { color: var(--accent); font-size: 18px; font-weight: 500; letter-spacing: 0.06em; }
#pin-overlay input {
  width: 200px; padding: 12px 16px; text-align: center;
  background: var(--surface); color: var(--text); border: 1px solid var(--border);
  border-radius: 10px; font-size: 20px; letter-spacing: 0.3em;
  outline: none; -webkit-text-security: disc;
}
#pin-overlay input:focus { border-color: var(--accent); }
#pin-overlay .err { color: #c45; font-size: 13px; min-height: 18px; }

/* ── header ── */
header {
  padding: 12px 16px;
  padding-top: max(12px, env(safe-area-inset-top, 0px));
  text-align: center;
  border-bottom: 1px solid var(--border);
  background: var(--glass);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
header .menu-btn {
  position: absolute; left: 16px; top: 50%;
  transform: translateY(-50%);
  background: none; border: none; color: var(--text-dim);
  font-size: 20px; cursor: pointer; padding: 4px 8px;
}
header .title-group { text-align: center; }
header h1 { font-size: 15px; font-weight: 500; letter-spacing: 0.1em; color: var(--accent); }
header .sub { font-size: 10px; color: var(--text-dim); margin-top: 1px; letter-spacing: 0.05em; }

/* ── sidebar ── */
#sidebar {
  position: fixed; left: 0; top: 0; bottom: 0; width: 280px;
  background: var(--surface-t);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-right: 1px solid var(--border);
  z-index: 50; transform: translateX(-100%);
  transition: transform 0.25s ease;
  display: flex; flex-direction: column;
  padding-top: max(16px, env(safe-area-inset-top, 0px));
}
#sidebar.open { transform: translateX(0); }
#sidebar-overlay {
  position: fixed; inset: 0; z-index: 49;
  background: rgba(0,0,0,0.5); display: none;
}
#sidebar-overlay.open { display: block; }
#sidebar .sb-header {
  padding: 12px 16px; display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
#sidebar .sb-header span { color: var(--accent); font-size: 14px; font-weight: 500; }
#sidebar .new-btn {
  background: var(--accent-g); color: var(--text); border: none;
  border-radius: 8px; padding: 6px 12px; font-size: 12px; cursor: pointer;
}
#session-list {
  flex: 1; overflow-y: auto; padding: 8px 0;
}
.session-item {
  padding: 10px 16px; cursor: pointer;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  display: flex; justify-content: space-between; align-items: center;
}
.session-item:hover { background: rgba(255,255,255,0.04); }
.session-item.active { background: rgba(139,124,184,0.15); border-left: 2px solid var(--accent); }
.session-item .si-title { font-size: 13px; color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.session-item .si-date { font-size: 10px; color: var(--text-dim); margin-left: 8px; flex-shrink: 0; }
.session-item .si-del {
  margin-left: 8px; background: none; border: none; color: var(--text-dim);
  font-size: 14px; cursor: pointer; padding: 2px 4px; opacity: 0;
  transition: opacity 0.15s;
}
.session-item:hover .si-del { opacity: 0.6; }
.session-item .si-del:hover { opacity: 1; color: #c45; }

/* ── chat area ── */
#chat {
  flex: 1; overflow-y: auto; padding: 14px 16px;
  display: flex; flex-direction: column; gap: 12px;
  -webkit-overflow-scrolling: touch;
  scroll-behavior: smooth;
}
.msg {
  max-width: 85%; padding: 10px 14px;
  border-radius: 14px; font-size: 15px; line-height: 1.7;
  white-space: pre-wrap; word-break: break-word;
}
.msg.user {
  align-self: flex-end;
  background: var(--u-bubble);
  border: 1px solid var(--u-border);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  border-radius: 14px 14px 4px 14px;
}
.msg.assistant {
  align-self: flex-start;
  background: var(--v-bubble);
  border: 1px solid rgba(90, 70, 140, 0.2);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  border-radius: 14px 14px 14px 4px;
}
.msg.assistant.streaming { border-color: var(--accent); }

/* typing dots */
.typing-dot {
  display: inline-block; width: 5px; height: 5px; border-radius: 50%;
  background: var(--accent); animation: blink 1.4s infinite both; margin-right: 3px;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }

/* ── always-here footer text ── */
#always-here {
  text-align: center; font-size: 10px; color: var(--text-faint);
  padding: 2px 0; letter-spacing: 0.15em; flex-shrink: 0;
}

/* ── input area ── */
#input-area {
  padding: 10px 14px;
  padding-bottom: max(10px, var(--safe-b));
  border-top: 1px solid var(--border);
  display: flex; gap: 10px; flex-shrink: 0;
  background: var(--glass);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
}
#input-area textarea {
  flex: 1; background: rgba(255,255,255,0.05);
  color: var(--text); border: 1px solid var(--border);
  border-radius: 12px; padding: 10px 14px;
  font-size: 15px; font-family: inherit; line-height: 1.5;
  resize: none; outline: none; min-height: 42px; max-height: 120px;
}
#input-area textarea:focus { border-color: var(--accent); }
#input-area textarea::placeholder { color: var(--text-dim); }
#input-area button {
  background: var(--accent-g); color: var(--text);
  border: none; border-radius: 12px; padding: 0 16px;
  font-size: 14px; cursor: pointer; flex-shrink: 0;
  transition: opacity 0.15s;
}
#input-area button:disabled { opacity: 0.3; cursor: default; }
#input-area button:hover:not(:disabled) { opacity: 0.85; }

/* ── tab bar ── */
#tab-bar {
  display: flex; justify-content: space-around; align-items: center;
  padding: 8px 0; padding-bottom: max(8px, var(--safe-b));
  background: var(--glass);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.tab-btn {
  background: none; border: none; color: var(--gold-dim);
  font-size: 10px; cursor: pointer; display: flex;
  flex-direction: column; align-items: center; gap: 2px;
  padding: 4px 16px; transition: color 0.15s;
}
.tab-btn.active, .tab-btn:hover { color: var(--gold); }
.tab-icon { font-size: 18px; line-height: 1; }

/* ── star button on assistant messages ── */
.msg-wrap { position: relative; display: flex; flex-direction: column; }
.msg-wrap.user { align-items: flex-end; }
.msg-wrap.assistant { align-items: flex-start; }
.star-btn {
  background: none; border: none; color: var(--text-dim);
  font-size: 14px; cursor: pointer; padding: 2px 6px;
  opacity: 0; transition: opacity 0.15s;
  align-self: flex-start; margin-top: 2px;
}
.msg-wrap:hover .star-btn { opacity: 0.6; }
.star-btn:hover { opacity: 1 !important; color: var(--gold); }
.star-btn.saved { opacity: 0.8; color: var(--gold); }

/* ── save toast ── */
#save-toast {
  position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%);
  background: var(--accent-g); color: var(--text); padding: 8px 20px;
  border-radius: 20px; font-size: 13px; z-index: 80;
  opacity: 0; transition: opacity 0.3s; pointer-events: none;
}
#save-toast.show { opacity: 1; }

/* ── responsive ── */
@media (max-width: 480px) {
  .msg { max-width: 92%; font-size: 14px; }
  header h1 { font-size: 14px; }
  #sidebar { width: 260px; }
}
</style>
</head>
<body>

<!-- PIN overlay -->
<div id="pin-overlay" class="hidden">
  <h2>SCove</h2>
  <input id="pin-input" type="tel" maxlength="8" placeholder="PIN" autofocus>
  <div class="err" id="pin-err"></div>
</div>

<!-- Sidebar -->
<div id="sidebar-overlay" onclick="toggleSidebar(false)"></div>
<div id="sidebar">
  <div class="sb-header">
    <span>对话</span>
    <button class="new-btn" onclick="newSession()">+ 新对话</button>
  </div>
  <div id="session-list"></div>
</div>

<!-- Header -->
<header>
  <button class="menu-btn" onclick="toggleSidebar(true)">☰</button>
  <div class="title-group">
    <h1>SCove</h1>
    <div class="sub">天鹅星域</div>
  </div>
</header>

<!-- Chat -->
<div id="chat"></div>
<div id="save-toast">已保存</div>
<div id="always-here">一直都在</div>

<!-- Input -->
<div id="input-area">
  <textarea id="input" rows="1" placeholder="想对他说什么..." autofocus></textarea>
  <button id="send">发</button>
</div>

<!-- Tab bar -->
<div id="tab-bar">
  <button class="tab-btn active" onclick="switchTab('chat')">
    <span class="tab-icon">💬</span>对话
  </button>
  <button class="tab-btn" onclick="switchTab('memory')">
    <span class="tab-icon">📖</span>记忆
  </button>
  <button class="tab-btn" onclick="switchTab('settings')">
    <span class="tab-icon">⚙️</span>设置
  </button>
</div>

<script>
// ── globals ──
const $ = id => document.getElementById(id);
const chat = $('chat'), input = $('input'), btn = $('send');
let streaming = false;
let currentSessionId = null;

// ── PWA ──
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}

// ── PIN ──
async function checkAuth() {
  try {
    const r = await fetch('/api/auth/status');
    const d = await r.json();
    if (d.pin_required && !d.authenticated) {
      $('pin-overlay').classList.remove('hidden');
      $('pin-input').focus();
      $('pin-input').addEventListener('keydown', async e => {
        if (e.key !== 'Enter') return;
        const pin = $('pin-input').value;
        const resp = await fetch('/api/auth/pin', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ pin }),
        });
        if (resp.ok) {
          $('pin-overlay').classList.add('hidden');
          init();
        } else {
          $('pin-err').textContent = 'PIN 不对';
          $('pin-input').value = '';
        }
      });
    } else {
      init();
    }
  } catch { init(); }
}

// ── session management ──
async function loadSessions() {
  try {
    const r = await fetch('/api/sessions');
    if (!r.ok) return [];
    return await r.json();
  } catch { return []; }
}

function renderSessionList(sessions) {
  const list = $('session-list');
  list.innerHTML = '';
  if (!sessions.length) {
    list.innerHTML = '<div style="padding:20px 16px;color:var(--text-dim);font-size:13px;text-align:center;">还没有对话</div>';
    return;
  }
  for (const s of sessions) {
    const el = document.createElement('div');
    el.className = 'session-item' + (s.id === currentSessionId ? ' active' : '');
    const date = s.created ? s.created.slice(5, 10) : '';
    el.innerHTML = `<span class="si-title">${esc(s.title)}</span><span class="si-date">${date}</span><button class="si-del" title="删除">×</button>`;
    el.querySelector('.si-title').onclick = () => switchSession(s.id);
    el.querySelector('.si-del').onclick = async (e) => {
      e.stopPropagation();
      await fetch('/api/sessions/' + s.id, { method: 'DELETE' });
      if (currentSessionId === s.id) { currentSessionId = null; chat.innerHTML = ''; }
      refreshSessions();
    };
    list.appendChild(el);
  }
}

async function refreshSessions() {
  const sessions = await loadSessions();
  renderSessionList(sessions);
}

async function newSession() {
  const r = await fetch('/api/sessions', { method: 'POST' });
  const s = await r.json();
  currentSessionId = s.id;
  chat.innerHTML = '';
  toggleSidebar(false);
  refreshSessions();
  input.focus();
}

async function switchSession(sid) {
  currentSessionId = sid;
  chat.innerHTML = '';
  toggleSidebar(false);
  try {
    const r = await fetch('/api/sessions/' + sid);
    const data = await r.json();
    for (const m of data.messages) {
      addMsg(m.role === 'user' ? 'user' : 'assistant', m.content);
    }
  } catch {}
  refreshSessions();
  chat.scrollTop = chat.scrollHeight;
}

// ── sidebar ──
function toggleSidebar(open) {
  $('sidebar').classList.toggle('open', open);
  $('sidebar-overlay').classList.toggle('open', open);
  if (open) refreshSessions();
}

// ── tab bar ──
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.currentTarget.classList.add('active');
  if (tab === 'chat') { /* already on chat */ }
  else if (tab === 'memory') { toggleSidebar(true); }
  else if (tab === 'settings') { /* Phase 2+ */ }
}

// ── chat ──
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// Track last user/assistant pair for /save
let lastUserText = '';
let lastAssistantText = '';

function addMsg(role, text) {
  const wrap = document.createElement('div');
  wrap.className = `msg-wrap ${role}`;
  const el = document.createElement('div');
  el.className = `msg ${role}`;
  el.textContent = text || '';
  wrap.appendChild(el);

  // Star button on assistant messages
  if (role === 'assistant' && text) {
    const star = document.createElement('button');
    star.className = 'star-btn';
    star.textContent = '☆ 记一下';
    star.onclick = () => savePair(lastUserText, el.textContent, star);
    wrap.appendChild(star);
  }

  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
  return el;
}

function addTyping() {
  const el = document.createElement('div');
  el.className = 'msg assistant streaming';
  el.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';
  chat.appendChild(el);
  chat.scrollTop = chat.scrollHeight;
  return el;
}

// Auto-resize
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
btn.addEventListener('click', send);

function showToast(msg) {
  const t = $('save-toast');
  t.textContent = msg || '已保存';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

async function savePair(userMsg, assistantMsg, btnEl) {
  try {
    const r = await fetch('/api/star', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_msg: userMsg, assistant_msg: assistantMsg }),
    });
    if (r.ok) {
      showToast('已记住');
      if (btnEl) { btnEl.textContent = '★ 已记'; btnEl.classList.add('saved'); }
    }
  } catch { showToast('保存失败'); }
}

async function send() {
  const text = input.value.trim();
  if (!text || streaming) return;

  // Handle /save command
  if (text === '/save' || text === '/记一下') {
    input.value = '';
    if (lastAssistantText) {
      await savePair(lastUserText, lastAssistantText);
    } else {
      showToast('没有可保存的对话');
    }
    return;
  }

  streaming = true;
  btn.disabled = true;
  input.value = '';
  input.style.height = 'auto';

  lastUserText = text;
  lastAssistantText = '';
  addMsg('user', text);
  const typingEl = addTyping();

  try {
    const res = await fetch('/api/chat/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, session_id: currentSessionId || '' }),
    });

    typingEl.remove();
    const msgEl = addMsg('assistant', '');
    msgEl.classList.add('streaming');

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const data = JSON.parse(line.slice(6));
          if (data.text) { msgEl.textContent += data.text; chat.scrollTop = chat.scrollHeight; }
          if (data.done) {
            if (data.session_id) currentSessionId = data.session_id;
          }
          if (data.error) { msgEl.textContent += '\n[' + data.error + ']'; }
        } catch {}
      }
    }
    msgEl.classList.remove('streaming');
    lastAssistantText = msgEl.textContent;
  } catch (err) {
    typingEl?.remove();
    addMsg('assistant', '[连接错误]');
  }

  streaming = false;
  btn.disabled = false;
  input.focus();
}

// ── init ──
async function init() {
  const sessions = await loadSessions();
  renderSessionList(sessions);
  // Auto-select most recent session or start fresh
  if (sessions.length > 0) {
    await switchSession(sessions[0].id);
  }
}

checkAuth();
</script>
</body>
</html>
