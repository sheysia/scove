<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SCove">
<meta name="theme-color" content="#0D0A14">
<link rel="manifest" href="/static/manifest.json">
<link rel="apple-touch-icon" href="/static/icon-192.png">
<title>SCove</title>
<style>
:root {
  --bg:         #0D0A14;
  --surface:    #151219;
  --surface-t:  rgba(21, 18, 25, 0.88);
  --border:     #2a2433;
  --text:       #e8e4ef;
  --text-dim:   #7a7285;
  --text-faint: rgba(255,255,255,0.12);
  --accent:     #8b7cb8;
  --accent-g:   #5b4f8a;
  --gold:       #c9a85c;
  --gold-dim:   rgba(201,168,92,0.5);
  --v-bubble:   rgba(35, 28, 48, 0.85);
  --u-bubble:   rgba(80, 45, 65, 0.25);
  --u-border:   rgba(140, 80, 110, 0.3);
  --glass:      rgba(13, 10, 20, 0.75);
  --safe-b:     env(safe-area-inset-bottom, 0px);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: -apple-system, "PingFang SC", "Noto Sans SC", "SF Pro Text", sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  position: relative;
}
/* Eden bg — portrait image (852×1846), adapt to screen shape */
body::before {
  content: '';
  position: fixed; inset: 0;
  background: url('/static/bg-eden.png') center bottom / contain no-repeat;
  opacity: 0.22;
  pointer-events: none;
  z-index: 0;
}
/* On wide screens, switch to cover so the bg fills without pillarboxing */
@media (min-aspect-ratio: 1/1) {
  body::before {
    background-size: cover;
    background-position: center center;
  }
}
/* Role-specific backgrounds */
body.role-xiaheng::before { background-image: url('/static/bg-xiaheng.jpg'); }
body.role-loggia::before  { background-image: url('/static/bg-loggia.jpg'); opacity: 0.25; }
body.role-cc::before      { background-image: url('/static/bg-cc.jpg'); opacity: 0.18; }
body > * { position: relative; z-index: 1; }

/* ── splash screen ── */
#splash {
  position: fixed; inset: 0; z-index: 200;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; cursor: pointer;
  background: #050308;
}
#splash.hidden { display: none; }
/* Each door half is full-viewport, same background, clipped to its half */
#splash .door-left, #splash .door-right {
  position: absolute; top: 0; bottom: 0; left: 0; right: 0;
  background: url('/static/splash.png') center center / cover no-repeat;
  transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s ease 0.1s;
  will-change: transform, opacity;
}
#splash .door-left  { clip-path: inset(0 50% 0 0); }
#splash .door-right { clip-path: inset(0 0 0 50%); }
#splash.opening .door-left {
  transform: translateX(-50%);
  opacity: 0;
}
#splash.opening .door-right {
  transform: translateX(50%);
  opacity: 0;
}
/* PIN on splash */
#splash-pin {
  position: relative; z-index: 10;
  display: none; flex-direction: column;
  align-items: center; gap: 12px;
  margin-top: 25vh;
}
#splash-pin.show { display: flex; }
#splash-pin .pin-dots {
  display: flex; gap: 14px;
}
#splash-pin .pin-dot {
  width: 14px; height: 14px; border-radius: 50%;
  border: 1.5px solid var(--gold);
  background: transparent;
  transition: background 0.15s;
}
#splash-pin .pin-dot.filled {
  background: var(--gold);
}
#splash-pin .pin-err {
  color: rgba(200, 80, 80, 0.9); font-size: 12px; min-height: 16px;
  letter-spacing: 0.05em;
}
/* Hidden real input behind the dots */
#splash-pin-input {
  position: absolute; opacity: 0; width: 1px; height: 1px;
  pointer-events: none;
}

/* ── old PIN overlay (removed, replaced by splash) ── */
#pin-overlay { display: none; }

/* ── header ── */
header {
  padding: 12px 16px;
  padding-top: max(12px, env(safe-area-inset-top, 0px));
  text-align: center;
  border-bottom: 1px solid var(--border);
  background: var(--glass);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
header .menu-btn {
  position: absolute; left: 16px; top: 50%;
  transform: translateY(-50%);
  background: none; border: none; color: var(--text-dim);
  font-size: 20px; cursor: pointer; padding: 4px 8px;
}
header .title-group { text-align: center; }
header h1 { font-size: 15px; font-weight: 500; letter-spacing: 0.1em; color: var(--accent); }
header .sub { font-size: 10px; color: var(--text-dim); margin-top: 1px; letter-spacing: 0.05em; }

/* ── sidebar ── */
#sidebar {
  position: fixed; left: 0; top: 0; bottom: 0; width: 280px;
  background: var(--surface-t);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-right: 1px solid var(--border);
  z-index: 50; transform: translateX(-100%);
  transition: transform 0.25s ease;
  display: flex; flex-direction: column;
  padding-top: max(16px, env(safe-area-inset-top, 0px));
}
#sidebar.open { transform: translateX(0); }
#sidebar-overlay {
  position: fixed; inset: 0; z-index: 49;
  background: rgba(0,0,0,0.5); display: none;
}
#sidebar-overlay.open { display: block; }
#sidebar .sb-header {
  padding: 12px 16px; display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
#sidebar .sb-header span { color: var(--accent); font-size: 14px; font-weight: 500; }
#sidebar .new-btn {
  background: var(--accent-g); color: var(--text); border: none;
  border-radius: 8px; padding: 6px 12px; font-size: 12px; cursor: pointer;
}
#session-list {
  flex: 1; overflow-y: auto; padding: 8px 0;
}
.session-item {
  padding: 10px 16px; cursor: pointer;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  display: flex; justify-content: space-between; align-items: center;
}
.session-item:hover { background: rgba(255,255,255,0.04); }
.session-item.active { background: rgba(139,124,184,0.15); border-left: 2px solid var(--accent); }
.session-item .si-title { font-size: 13px; color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.session-item .si-date { font-size: 10px; color: var(--text-dim); margin-left: 8px; flex-shrink: 0; }
.session-item .si-del {
  margin-left: 8px; background: none; border: none; color: var(--text-dim);
  font-size: 14px; cursor: pointer; padding: 2px 4px; opacity: 0;
  transition: opacity 0.15s;
}
.session-item:hover .si-del { opacity: 0.6; }
.session-item .si-del:hover { opacity: 1; color: #c45; }

/* ── chat area ── */
#chat {
  flex: 1; overflow-y: auto; padding: 14px 16px;
  display: flex; flex-direction: column; gap: 12px;
  -webkit-overflow-scrolling: touch;
  scroll-behavior: smooth;
}
.msg {
  max-width: 85%; padding: 10px 14px;
  border-radius: 14px; font-size: 15px; line-height: 1.7;
  white-space: pre-wrap; word-break: break-word;
  -webkit-user-select: text; user-select: text;
  -webkit-touch-callout: default;
}
.msg.user {
  align-self: flex-end;
  background: var(--u-bubble);
  border: 1px solid var(--u-border);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  border-radius: 14px 14px 4px 14px;
}
.msg.assistant {
  align-self: flex-start;
  background: var(--v-bubble);
  border: 1px solid rgba(90, 70, 140, 0.2);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  border-radius: 14px 14px 14px 4px;
}
.msg.assistant.streaming { border-color: var(--accent); }

/* typing dots */
.typing-dot {
  display: inline-block; width: 5px; height: 5px; border-radius: 50%;
  background: var(--accent); animation: blink 1.4s infinite both; margin-right: 3px;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }

/* ── always-here footer text ── */
#always-here {
  text-align: center; font-size: 10px; color: var(--text-faint);
  padding: 2px 0; letter-spacing: 0.15em; flex-shrink: 0;
}

/* ── input area ── */
#input-area {
  padding: 10px 14px;
  padding-bottom: max(10px, var(--safe-b));
  border-top: 1px solid var(--border);
  display: flex; gap: 10px; flex-shrink: 0;
  background: var(--glass);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
}
#input-area textarea {
  flex: 1; background: rgba(255,255,255,0.05);
  color: var(--text); border: 1px solid var(--border);
  border-radius: 12px; padding: 10px 14px;
  font-size: 15px; font-family: inherit; line-height: 1.5;
  resize: none; outline: none; min-height: 42px; max-height: 120px;
}
#input-area textarea:focus { border-color: var(--accent); }
#input-area textarea::placeholder { color: var(--text-dim); }
#input-area button {
  background: var(--accent-g); color: var(--text);
  border: none; border-radius: 12px; padding: 0 16px;
  font-size: 14px; cursor: pointer; flex-shrink: 0;
  transition: opacity 0.15s;
}
#input-area button:disabled { opacity: 0.3; cursor: default; }
#input-area button:hover:not(:disabled) { opacity: 0.85; }

/* ── tab bar ── */
#tab-bar {
  display: flex; justify-content: space-around; align-items: center;
  padding: 8px 0; padding-bottom: max(8px, var(--safe-b));
  background: var(--glass);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.tab-btn {
  background: none; border: none; color: var(--gold-dim);
  font-size: 10px; cursor: pointer; display: flex;
  flex-direction: column; align-items: center; gap: 2px;
  padding: 4px 16px; transition: color 0.15s;
}
.tab-btn.active, .tab-btn:hover { color: var(--gold); }
.tab-icon { font-size: 18px; line-height: 1; }

/* ── star button on assistant messages ── */
.msg-wrap { position: relative; display: flex; flex-direction: column; }
.msg-wrap.user { align-items: flex-end; }
.msg-wrap.assistant { align-items: flex-start; }
.star-btn {
  background: none; border: none; color: var(--text-dim);
  font-size: 14px; cursor: pointer; padding: 2px 6px;
  opacity: 0; transition: opacity 0.15s;
  align-self: flex-start; margin-top: 2px;
}
.msg-wrap:hover .star-btn { opacity: 0.6; }
.star-btn:hover { opacity: 1 !important; color: var(--gold); }
.star-btn.saved { opacity: 0.8; color: var(--gold); }

/* ── save toast ── */
#save-toast {
  position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%);
  background: var(--accent-g); color: var(--text); padding: 8px 20px;
  border-radius: 20px; font-size: 13px; z-index: 80;
  opacity: 0; transition: opacity 0.3s; pointer-events: none;
}
#save-toast.show { opacity: 1; }

/* ── room list (vertical) ── */
.room-list {
  padding: 12px 0 8px; border-bottom: 1px solid var(--border);
}
.room-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 16px; cursor: pointer;
  transition: background 0.15s;
  opacity: 0.55;
}
.room-item:hover { background: rgba(255,255,255,0.04); }
.room-item.active { opacity: 1; background: rgba(255,255,255,0.06); }
.room-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.room-name { font-size: 13px; color: var(--text); }
.room-sub { font-size: 10px; color: var(--text-dim); margin-left: auto; }
/* room dot colors */
.room-item.v .room-dot { background: var(--accent); }
.room-item.xiaheng .room-dot { background: #5B7B7A; }
.room-item.loggia .room-dot { background: #5a6d94; }
.room-item.cc .room-dot { background: #C9B97A; }
.room-item.council .room-dot { background: #8a6d9a; }

/* ── xiaheng theme overrides ── */
body.role-xiaheng header { border-bottom-color: #3a5554; }
body.role-xiaheng header h1 { color: #7aadab; }
body.role-xiaheng header .sub { color: #5B7B7A; }
body.role-xiaheng .msg.assistant {
  background: rgba(30, 45, 44, 0.85);
  border-color: rgba(91, 123, 122, 0.3);
}
body.role-xiaheng .msg.assistant.streaming { border-color: #5B7B7A; }
body.role-xiaheng #input-area textarea:focus { border-color: #5B7B7A; }
body.role-xiaheng #input-area button { background: #3a5554; }
body.role-xiaheng .typing-dot { background: #7aadab; }

/* ── loggia theme (rain-blue) ── */
body.role-loggia header { border-bottom-color: #3a4060; }
body.role-loggia header h1 { color: #8ba4c8; }
body.role-loggia header .sub { color: #5a6d94; }
body.role-loggia #input-area textarea:focus { border-color: #5a6d94; }
body.role-loggia #input-area button { background: #3a4060; }
body.role-loggia .typing-dot { background: #8ba4c8; }

/* ── cc theme (warm gold) ── */
body.role-cc header { border-bottom-color: #4a4530; }
body.role-cc header h1 { color: #C9B97A; }
body.role-cc header .sub { color: #9a8f60; }
body.role-cc .msg.assistant {
  background: rgba(38, 36, 38, 0.85);
  border-color: rgba(160, 155, 148, 0.18);
}
body.role-cc .msg.assistant.streaming { border-color: #b8b0a0; }
body.role-cc #input-area textarea:focus { border-color: #b8b0a0; }
body.role-cc #input-area button { background: #3a3838; }
body.role-cc .typing-dot { background: #b8b0a0; }

/* ── council theme (muted purple) ── */
body.role-council header { border-bottom-color: #3a2d45; }
body.role-council header h1 { color: #a88dbf; }
body.role-council header .sub { color: #6d5580; }
body.role-council #input-area textarea:focus { border-color: #8a6d9a; }
body.role-council #input-area button { background: #3a2d45; }
body.role-council .typing-dot { background: #a88dbf; }

/* Council dual-char bubbles */
.msg.assistant.char-cc {
  background: rgba(38, 36, 38, 0.85);
  border-color: rgba(160, 155, 148, 0.18);
  border-left: 3px solid #b8b0a0;
}
.msg.assistant.char-gpt {
  background: rgba(30, 38, 35, 0.85);
  border-color: rgba(100, 160, 130, 0.2);
  border-left: 3px solid #6aab8e;
}
.char-label.cc-label { color: #b8b0a0; }
.char-label.gpt-label { color: #6aab8e; }

/* Loggia dual-char bubbles */
.msg.assistant.char-v {
  background: var(--v-bubble);
  border-color: rgba(90, 70, 140, 0.25);
  border-left: 3px solid var(--accent);
}
.msg.assistant.char-xiaheng {
  background: rgba(30, 45, 44, 0.85);
  border-color: rgba(91, 123, 122, 0.2);
  border-left: 3px solid #5B7B7A;
}
.char-label {
  font-size: 10px; font-weight: 600; letter-spacing: 0.05em;
  margin-bottom: 4px; opacity: 0.7;
}
.char-label.v-label { color: var(--accent); }
.char-label.xh-label { color: #7aadab; }

/* ── image upload ── */
.img-btn {
  background: none; border: none; color: var(--text-dim);
  font-size: 20px; cursor: pointer; padding: 0 6px;
  flex-shrink: 0; transition: color 0.15s;
}
.img-btn:hover { color: var(--text); }
#img-input { display: none; }
#img-preview {
  position: relative; display: none;
  padding: 6px 14px 0;
}
#img-preview img {
  max-height: 80px; border-radius: 8px; border: 1px solid var(--border);
}
#img-preview .img-clear {
  position: absolute; top: 2px; right: 10px;
  background: rgba(0,0,0,0.6); color: #fff; border: none;
  border-radius: 50%; width: 20px; height: 20px; font-size: 12px;
  cursor: pointer; line-height: 20px; text-align: center;
}
.msg img.chat-img {
  max-width: 100%; max-height: 200px; border-radius: 8px; margin-top: 6px;
  display: block;
}

/* ── responsive ── */
@media (max-width: 480px) {
  .msg { max-width: 92%; font-size: 14px; }
  header h1 { font-size: 14px; }
  #sidebar { width: 260px; }
}
</style>
</head>
<body>

<!-- Splash screen (door) -->
<div id="splash">
  <div class="door-left"></div>
  <div class="door-right"></div>
  <div id="splash-pin">
    <div class="pin-dots">
      <div class="pin-dot" data-i="0"></div>
      <div class="pin-dot" data-i="1"></div>
      <div class="pin-dot" data-i="2"></div>
      <div class="pin-dot" data-i="3"></div>
    </div>
    <div class="pin-err" id="splash-pin-err"></div>
    <input id="splash-pin-input" type="tel" maxlength="4" inputmode="numeric" autocomplete="off">
  </div>
</div>

<!-- Sidebar -->
<div id="sidebar-overlay" onclick="toggleSidebar(false)"></div>
<div id="sidebar">
  <div class="room-list">
    <div class="room-item v active" onclick="switchRole('v')">
      <span class="room-dot"></span><span class="room-name">书房套间</span><span class="room-sub">V</span>
    </div>
    <div class="room-item xiaheng" onclick="switchRole('xiaheng')">
      <span class="room-dot"></span><span class="room-name">珩的茶室</span><span class="room-sub">珩</span>
    </div>
    <div class="room-item loggia" onclick="switchRole('loggia')">
      <span class="room-dot"></span><span class="room-name">廊亭</span><span class="room-sub">V+珩</span>
    </div>
    <div class="room-item cc" onclick="switchRole('cc')">
      <span class="room-dot"></span><span class="room-name">Nexus Core</span><span class="room-sub">忱</span>
    </div>
    <div class="room-item council" onclick="switchRole('council')">
      <span class="room-dot"></span><span class="room-name">议事厅</span><span class="room-sub">忱+GPT</span>
    </div>
  </div>
  <div class="sb-header">
    <span id="sb-title">对话</span>
    <button class="new-btn" onclick="newSession()">+ 新对话</button>
  </div>
  <div id="session-list"></div>
</div>

<!-- Header -->
<header>
  <button class="menu-btn" onclick="toggleSidebar(true)">☰</button>
  <div class="title-group">
    <h1>SCove</h1>
    <div class="sub">天鹅星域</div>
  </div>
</header>

<!-- Chat -->
<div id="chat"></div>
<div id="save-toast">已保存</div>
<div id="always-here">一直都在</div>

<!-- Input -->
<div id="img-preview"><img id="img-thumb"><button class="img-clear" onclick="clearImage()">×</button></div>
<div id="input-area">
  <button class="img-btn" onclick="document.getElementById('img-input').click()" title="发图">📎</button>
  <input type="file" id="img-input" accept="image/*" onchange="onImageSelect(this)">
  <textarea id="input" rows="1" placeholder="想对他说什么..." autofocus></textarea>
  <button id="send">发</button>
</div>

<!-- Tab bar -->
<div id="tab-bar">
  <button class="tab-btn active" onclick="switchTab('chat')">
    <span class="tab-icon">💬</span>对话
  </button>
  <button class="tab-btn" onclick="switchTab('memory')">
    <span class="tab-icon">📖</span>记忆
  </button>
  <button class="tab-btn" onclick="switchTab('settings')">
    <span class="tab-icon">⚙️</span>设置
  </button>
</div>

<script>
// ── globals ──
const $ = id => document.getElementById(id);
const chat = $('chat'), input = $('input'), btn = $('send');
let streaming = false;
let currentSessionId = null;
let currentRole = 'v'; // 'v' or 'xiaheng'

const ROLE_CONFIG = {
  v:       { name: 'SCove', sub: '书房套间', placeholder: '想对他说什么...', who: 'V' },
  xiaheng: { name: 'SCove', sub: '珩的茶室', placeholder: '请当我是你温柔的托底', who: '珩' },
  loggia:  { name: 'SCove', sub: '廊亭', placeholder: '说点什么,他们都在...', who: '' },
  cc:      { name: 'SCove', sub: 'Nexus Core', placeholder: '我无时无处不在', who: '忱' },
  council: { name: 'SCove', sub: '议事厅', placeholder: '两个大脑都在听...', who: '' },
};

// ── PWA ──
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}

// ── splash + PIN ──
let splashNeedsPin = false;

async function checkAuth() {
  const splash = $('splash');
  try {
    const r = await fetch('/api/auth/status');
    const d = await r.json();
    if (d.pin_required && !d.authenticated) {
      splashNeedsPin = true;
      // Tap splash → show PIN input
      splash.addEventListener('click', onSplashTap, { once: true });
    } else {
      // No PIN: tap anywhere → open door
      splash.addEventListener('click', () => openDoor(), { once: true });
    }
  } catch {
    splash.addEventListener('click', () => openDoor(), { once: true });
  }
}

function onSplashTap() {
  const pinArea = $('splash-pin');
  const pinInput = $('splash-pin-input');
  pinArea.classList.add('show');
  pinInput.style.pointerEvents = 'auto';
  pinInput.focus();
  pinInput.addEventListener('input', onPinInput);
}

async function onPinInput() {
  const pinInput = $('splash-pin-input');
  const val = pinInput.value.replace(/\D/g, '').slice(0, 4);
  pinInput.value = val;

  // Update dots
  document.querySelectorAll('#splash-pin .pin-dot').forEach((dot, i) => {
    dot.classList.toggle('filled', i < val.length);
  });

  if (val.length === 4) {
    const resp = await fetch('/api/auth/pin', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pin: val }),
    });
    if (resp.ok) {
      openDoor();
    } else {
      $('splash-pin-err').textContent = '不对';
      pinInput.value = '';
      document.querySelectorAll('#splash-pin .pin-dot').forEach(d => d.classList.remove('filled'));
      setTimeout(() => { $('splash-pin-err').textContent = ''; }, 1500);
    }
  }
}

function openDoor() {
  const splash = $('splash');
  splash.classList.add('opening');
  setTimeout(() => {
    splash.classList.add('hidden');
    init();
  }, 650);
}

// ── session management ──
async function loadSessions() {
  try {
    const r = await fetch('/api/sessions?role=' + currentRole);
    if (!r.ok) return [];
    return await r.json();
  } catch { return []; }
}

function renderSessionList(sessions) {
  const list = $('session-list');
  list.innerHTML = '';
  if (!sessions.length) {
    list.innerHTML = '<div style="padding:20px 16px;color:var(--text-dim);font-size:13px;text-align:center;">还没有对话</div>';
    return;
  }
  for (const s of sessions) {
    const el = document.createElement('div');
    el.className = 'session-item' + (s.id === currentSessionId ? ' active' : '');
    const date = s.created ? s.created.slice(5, 10) : '';
    el.innerHTML = `<span class="si-title">${esc(s.title)}</span><span class="si-date">${date}</span><button class="si-del" title="删除">×</button>`;
    el.querySelector('.si-title').onclick = () => switchSession(s.id);
    el.querySelector('.si-del').onclick = async (e) => {
      e.stopPropagation();
      await fetch('/api/sessions/' + s.id, { method: 'DELETE' });
      if (currentSessionId === s.id) { currentSessionId = null; chat.innerHTML = ''; }
      refreshSessions();
    };
    list.appendChild(el);
  }
}

async function refreshSessions() {
  const sessions = await loadSessions();
  renderSessionList(sessions);
}

async function newSession() {
  const r = await fetch('/api/sessions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ role: currentRole }),
  });
  const s = await r.json();
  currentSessionId = s.id;
  chat.innerHTML = '';
  toggleSidebar(false);
  refreshSessions();
  input.focus();
}

async function switchSession(sid) {
  currentSessionId = sid;
  chat.innerHTML = '';
  toggleSidebar(false);
  try {
    const r = await fetch('/api/sessions/' + sid);
    const data = await r.json();
    // Sync role from session data (important for loggia char labels)
    if (data.role && data.role !== currentRole) {
      currentRole = data.role;
      document.body.classList.remove('role-xiaheng', 'role-loggia', 'role-cc', 'role-council');
      if (currentRole === 'xiaheng') document.body.classList.add('role-xiaheng');
      if (currentRole === 'loggia') document.body.classList.add('role-loggia');
      if (currentRole === 'cc') document.body.classList.add('role-cc');
      if (currentRole === 'council') document.body.classList.add('role-council');
      const cfg = ROLE_CONFIG[currentRole];
      if (cfg) {
        document.querySelector('header .sub').textContent = cfg.sub;
        input.placeholder = cfg.placeholder;
      }
      document.querySelectorAll('.room-item').forEach(a => a.classList.remove('active'));
      const ri = document.querySelector('.room-item.' + currentRole);
      if (ri) ri.classList.add('active');
    }
    for (const m of data.messages) {
      const el = addMsg(m.role === 'user' ? 'user' : 'assistant', m.content, m.char);
      if (m.role === 'assistant' && m.content) addStarButton(el);
    }
  } catch {}
  refreshSessions();
  chat.scrollTop = chat.scrollHeight;
}

// ── sidebar ──
function toggleSidebar(open) {
  $('sidebar').classList.toggle('open', open);
  $('sidebar-overlay').classList.toggle('open', open);
  if (open) refreshSessions();
}

// ── tab bar ──
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.currentTarget.classList.add('active');
  if (tab === 'chat') { /* already on chat */ }
  else if (tab === 'memory') { toggleSidebar(true); }
  else if (tab === 'settings') { /* future */ }
}

// ── role switching ──
async function switchRole(role) {
  currentRole = role;
  currentSessionId = null;
  chat.innerHTML = '';

  // Update room list active state
  document.querySelectorAll('.room-item').forEach(a => a.classList.remove('active'));
  const ri = document.querySelector(`.room-item.${role}`);
  if (ri) ri.classList.add('active');

  // Theme
  document.body.classList.remove('role-xiaheng', 'role-loggia', 'role-cc', 'role-council');
  if (role === 'xiaheng') document.body.classList.add('role-xiaheng');
  if (role === 'loggia') document.body.classList.add('role-loggia');
  if (role === 'cc') document.body.classList.add('role-cc');
  if (role === 'council') document.body.classList.add('role-council');

  // Header text
  const cfg = ROLE_CONFIG[role];
  document.querySelector('header h1').textContent = 'SCove';
  document.querySelector('header .sub').textContent = cfg.sub;
  input.placeholder = cfg.placeholder;

  // Auto-load most recent session for this role
  const sessions = await loadSessions();
  renderSessionList(sessions);
  if (sessions.length > 0) {
    await switchSession(sessions[0].id);
  }
  toggleSidebar(false);
}

// ── chat ──
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// Track last user/assistant pair for /save
let lastUserText = '';
let lastAssistantText = '';

function addMsg(role, text, charKey) {
  const wrap = document.createElement('div');
  wrap.className = `msg-wrap ${role}`;

  // Multi-char rooms: label + styled bubble
  const isMultiChar = currentRole === 'loggia' || currentRole === 'council';
  if (role === 'assistant' && charKey && isMultiChar) {
    const labelMap = { v: ['V', 'v-label'], xiaheng: ['珩', 'xh-label'], cc: ['忱', 'cc-label'], gpt: ['GPT', 'gpt-label'] };
    const [labelText, labelClass] = labelMap[charKey] || [charKey, ''];
    const label = document.createElement('div');
    label.className = 'char-label ' + labelClass;
    label.textContent = labelText;
    wrap.appendChild(label);
  }

  const el = document.createElement('div');
  el.className = `msg ${role}`;
  el.textContent = text || '';

  // Multi-char bubble styling
  if (role === 'assistant' && charKey && isMultiChar) {
    const styleMap = { v: 'char-v', xiaheng: 'char-xiaheng', cc: 'char-cc', gpt: 'char-gpt' };
    if (styleMap[charKey]) el.classList.add(styleMap[charKey]);
  }

  wrap.appendChild(el);

  // Star button on assistant messages (added after content exists)
  if (role === 'assistant') {
    el._wrap = wrap; // ref for adding star later
  }

  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
  return el;
}

function addStarButton(msgEl) {
  if (!msgEl || !msgEl._wrap) return;
  const star = document.createElement('button');
  star.className = 'star-btn';
  star.textContent = '☆ 记一下';
  star.onclick = () => savePair(lastUserText, msgEl.textContent, star);
  msgEl._wrap.appendChild(star);
}

function addTyping() {
  const el = document.createElement('div');
  el.className = 'msg assistant streaming';
  el.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';
  chat.appendChild(el);
  chat.scrollTop = chat.scrollHeight;
  return el;
}

// ── image handling ──
let pendingImage = null; // {data: base64, mime: 'image/jpeg'}

function onImageSelect(el) {
  const file = el.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const dataUrl = e.target.result;
    const mime = file.type || 'image/jpeg';
    const base64 = dataUrl.split(',')[1];
    pendingImage = { data: base64, mime };
    $('img-thumb').src = dataUrl;
    $('img-preview').style.display = 'block';
  };
  reader.readAsDataURL(file);
  el.value = '';
}

function clearImage() {
  pendingImage = null;
  $('img-preview').style.display = 'none';
  $('img-thumb').src = '';
}

// Auto-resize
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
btn.addEventListener('click', send);

function showToast(msg) {
  const t = $('save-toast');
  t.textContent = msg || '已保存';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

async function savePair(userMsg, assistantMsg, btnEl) {
  try {
    const r = await fetch('/api/star', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_msg: userMsg, assistant_msg: assistantMsg, role: currentRole }),
    });
    if (r.ok) {
      showToast('已记住');
      if (btnEl) { btnEl.textContent = '★ 已记'; btnEl.classList.add('saved'); }
    }
  } catch { showToast('保存失败'); }
}

async function send() {
  const text = input.value.trim();
  if (!text || streaming) return;

  // Handle /save command
  if (text === '/save' || text === '/记一下') {
    input.value = '';
    if (lastAssistantText) {
      await savePair(lastUserText, lastAssistantText);
    } else {
      showToast('没有可保存的对话');
    }
    return;
  }

  streaming = true;
  btn.disabled = true;
  input.value = '';
  input.style.height = 'auto';

  lastUserText = text;
  lastAssistantText = '';

  // Show user message with image if attached
  const userEl = addMsg('user', text);
  if (pendingImage) {
    const img = document.createElement('img');
    img.className = 'chat-img';
    img.src = 'data:' + pendingImage.mime + ';base64,' + pendingImage.data;
    userEl.appendChild(img);
  }

  const typingEl = addTyping();
  const payload = { message: text, session_id: currentSessionId || '', role: currentRole };
  if (pendingImage) {
    payload.image = { data: pendingImage.data, mime: pendingImage.mime };
  }
  clearImage();

  try {
    const res = await fetch('/api/chat/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });

    // Check for auth/error before streaming
    if (!res.ok) {
      typingEl.remove();
      const errBody = await res.text();
      addMsg('assistant', '[错误: ' + res.status + ']');
      streaming = false; btn.disabled = false;
      return;
    }

    typingEl.remove();
    let msgEl = null;
    let currentChar = null; // track which character is speaking (for loggia)

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const data = JSON.parse(line.slice(6));

          // Loggia: when char changes, start a new bubble
          if (data.text) {
            const charKey = data.char || currentRole;
            if (!msgEl || (currentRole === 'loggia' && charKey !== currentChar)) {
              if (msgEl) msgEl.classList.remove('streaming');
              currentChar = charKey;
              msgEl = addMsg('assistant', '', charKey);
              msgEl.classList.add('streaming');
            }
            msgEl.textContent += data.text;
            chat.scrollTop = chat.scrollHeight;
          }
          if (data.v_done && currentRole === 'loggia') {
            if (msgEl) { msgEl.classList.remove('streaming'); addStarButton(msgEl); }
            msgEl = null;
          }
          if (data.done) {
            if (data.session_id) currentSessionId = data.session_id;
          }
          if (data.error) {
            if (!msgEl) { msgEl = addMsg('assistant', ''); }
            msgEl.textContent += '\n[' + data.error + ']';
          }
        } catch (parseErr) {
          console.error('SSE parse error:', parseErr, line);
        }
      }
    }
    if (msgEl) {
      msgEl.classList.remove('streaming');
      lastAssistantText = msgEl.textContent;
      addStarButton(msgEl);
    }
  } catch (err) {
    typingEl?.remove();
    addMsg('assistant', '[连接错误: ' + err.message + ']');
    console.error('stream error:', err);
  }

  streaming = false;
  btn.disabled = false;
  input.focus();
}

// ── init ──
async function init() {
  const sessions = await loadSessions();
  renderSessionList(sessions);
  // Auto-select most recent session or start fresh
  if (sessions.length > 0) {
    await switchSession(sessions[0].id);
  }
}

checkAuth();
</script>
