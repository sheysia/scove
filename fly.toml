app = "scove-app"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  V_ROOT = "/soul_static"
  VHOME_ROOT = "/app"

[mounts]
  source = "scove_data"
  destination = "/data"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/healthz"
